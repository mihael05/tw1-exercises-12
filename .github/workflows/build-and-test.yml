name: Build and Test

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Exercises12.sln

      - name: Build
        run: dotnet build Exercises12.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Exercises12.sln --configuration Release --no-build --verbosity normal
